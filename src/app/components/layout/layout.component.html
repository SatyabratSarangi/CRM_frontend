<div class="app-layout" [class.sidebar-collapsed]="sidebarCollapsed">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="brand">
        <mat-icon class="brand-icon">business_center</mat-icon>
        <span class="brand-text" *ngIf="!sidebarCollapsed">CRM</span>
      </div>
    </div>

    <nav class="sidebar-nav">
      <ng-container *ngFor="let item of navItems">
        <a *ngIf="item.route !== '/lead-types' || isAdmin()"
           [routerLink]="item.route"
           routerLinkActive="active"
           class="nav-item">
          <mat-icon>{{ item.icon }}</mat-icon>
          <span class="nav-label" *ngIf="!sidebarCollapsed">{{ item.label }}</span>
        </a>
      </ng-container>
    </nav>

    <div class="sidebar-footer">
      <a class="nav-item" (click)="logout()">
        <mat-icon>logout</mat-icon>
        <span class="nav-label" *ngIf="!sidebarCollapsed">Logout</span>
      </a>
    </div>
  </aside>

  <!-- Main Content -->
  <div class="main-wrapper">
    <!-- Top Toolbar -->
    <header class="toolbar">
      <button mat-icon-button (click)="toggleSidebar()" class="menu-toggle">
        <mat-icon>{{ sidebarCollapsed ? 'menu' : 'menu_open' }}</mat-icon>
      </button>

      <div class="toolbar-spacer"></div>

      <div class="user-info">
        <!-- Install PWA Button -->
        <button *ngIf="showInstallButton" mat-raised-button color="primary" class="install-btn" (click)="installPwa()" matTooltip="Install CRM App">
          <mat-icon>get_app</mat-icon> <span class="install-text">Install App</span>
        </button>

        <!-- Theme Toggle Button -->
        <button mat-icon-button (click)="toggleTheme()" matTooltip="Toggle Dark/Light Mode" class="theme-toggle-btn">
          <mat-icon>{{ isDarkTheme() ? 'light_mode' : 'dark_mode' }}</mat-icon>
        </button>

        <div class="user-avatar">
          <mat-icon>person</mat-icon>
        </div>
        <span class="user-name">{{ username }}</span>
        <button mat-icon-button (click)="logout()" matTooltip="Logout">
          <mat-icon>power_settings_new</mat-icon>
        </button>
      </div>
    </header>

    <!-- Page Content -->
    <main class="content-area">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
