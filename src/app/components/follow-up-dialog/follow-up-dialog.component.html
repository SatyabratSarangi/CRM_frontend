<h2 mat-dialog-title>Add Follow-up</h2>

<mat-dialog-content>
  <form [formGroup]="form" class="dialog-form">
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Follow-up Date</mat-label>
      <input matInput [matDatepicker]="fuPicker" formControlName="followUpDate">
      <mat-datepicker-toggle matSuffix [for]="fuPicker"></mat-datepicker-toggle>
      <mat-datepicker #fuPicker></mat-datepicker>
      <mat-error>Date is required</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Update Lead Status</mat-label>
      <mat-select formControlName="status">
        <mat-option value="">No change</mat-option>
        <mat-option *ngFor="let s of statuses" [value]="s">{{ s }}</mat-option>
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Next Follow-up Date</mat-label>
      <input matInput [matDatepicker]="nextPicker" formControlName="nextFollowUpDate">
      <mat-datepicker-toggle matSuffix [for]="nextPicker"></mat-datepicker-toggle>
      <mat-datepicker #nextPicker></mat-datepicker>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Notes</mat-label>
      <textarea matInput formControlName="notes" rows="3" placeholder="Follow-up notes..."></textarea>
    </mat-form-field>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="dialogRef.close()" class="cancel-btn">Cancel</button>
  <button mat-raised-button class="save-btn" (click)="onSave()" [disabled]="form.invalid || loading">
    <mat-spinner *ngIf="loading" diameter="18"></mat-spinner>
    <span *ngIf="!loading">Save Follow-up</span>
  </button>
</mat-dialog-actions>
